services:
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskflow_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskflow_ai"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: taskflow-ai-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-ai-backend
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/taskflow_ai
      REDIS_URL: redis://redis:6379
      JWT_SECRET: "change-this-secret-in-production"
      OPENAI_API_KEY: ""
      OPENAI_MODEL: "gpt-4.1-mini"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-ai-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: "http://localhost:4000"
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  redis_data:

